<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namaz Vakitleri</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@900&family=Red+Hat+Mono:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <main class="container">
        <div class="contentCenter">

            <h2 class="baslikVakit">Namaz Vakitleri</h2>

            <div class="mainContent">
                <div class="vakitSatiri">
                    <span class="vakitAdi">İmsak</span>
                    <span id="fajrVakti" class="vakitSaati">--:--</span>
                </div>
                <div class="vakitSatiri">
                    <span class="vakitAdi">Güneş</span>
                    <span id="sunriseVakti" class="vakitSaati">--:--</span>
                </div>
                <div class="vakitSatiri">
                    <span class="vakitAdi">Öğle</span>
                    <span id="dhuhrVakti" class="vakitSaati">--:--</span>
                </div>
                <div class="vakitSatiri">
                    <span class="vakitAdi">İkindi</span>
                    <span id="asrVakti" class="vakitSaati">--:--</span>
                </div>
                <div class="vakitSatiri">
                    <span class="vakitAdi">Akşam</span>
                    <span id="maghribVakti" class="vakitSaati">--:--</span>
                </div>
                <div class="vakitSatiri">
                    <span class="vakitAdi">Yatsı</span>
                    <span id="ishaVakti" class="vakitSaati">--:--</span>
                </div>
            </div>

            <div class="sayacKonteyner">
                <p id="vakitIsmi">Yükleniyor...</p>
                <div id="sayac">00:00:00</div>
                <div class="sayacCizgi"></div>
            </div>

        </div>

        <div class="settingsCard">
            <label for="sehirSecici">Bölge Seçimi</label>
            <select id="sehirSecici" onchange="sehirDegisti()">
                <option value="Istanbul">İstanbul</option>
                <option value="Ankara">Ankara</option>
                <option value="Izmir">İzmir</option>
                <option value="Bursa">Bursa</option>
                <option value="Denizli">Denizli</option>
                <option value="Antalya">Antalya</option>
                <option value="Konya">Konya</option>
                <option value="Adana">Adana</option>
            </select>
        </div>

    </main>

    <script src="app.js"></script>
</body>

</html>
